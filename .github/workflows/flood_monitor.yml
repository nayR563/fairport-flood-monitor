name: Fairport Flood Monitor

on:
  schedule:
    - cron: '0 */6 * * *'
    - cron: '0 23 * * 4'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Which run mode to use'
        required: true
        default: 'check'
        type: choice
        options:
          - check
          - weekly
          - both

jobs:
  flood-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "0 23 * * 4" ]; then
              echo "mode=weekly" >> $GITHUB_OUTPUT
            else
              echo "mode=check" >> $GITHUB_OUTPUT
            fi
          else
            if [ "${{ github.event.inputs.mode }}" = "weekly" ]; then
              echo "mode=weekly" >> $GITHUB_OUTPUT
            elif [ "${{ github.event.inputs.mode }}" = "both" ]; then
              echo "mode=both" >> $GITHUB_OUTPUT
            else
              echo "mode=check" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run flood monitor
        run: |
          if [ "${{ steps.mode.outputs.mode }}" = "weekly" ]; then
            python flood_monitor.py --weekly
          elif [ "${{ steps.mode.outputs.mode }}" = "both" ]; then
            python flood_monitor.py --both
          else
            python flood_monitor.py --check
          fi
        env:
          PYTHONUNBUFFERED: "1"
      - name: Install dependencies
        run: pip install requests

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            echo "mode=check" >> $GITHUB_OUTPUT
          fi

      - name: Run flood monitor
        run: python flood_monitor.py --${{ steps.mode.outputs.mode }}
        env:
          PYTHONUNBUFFERED: "1"

  weekly-report:
    runs-on: ubuntu-latest
    # Only run on Thursday cron or manual weekly trigger
    if: >
      github.event.schedule == '0 23 * * 4' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'weekly') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'both')

    steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.11'

  - name: Install dependencies
    run: pip install requests

  - name: Run flood monitor (alerts + weekly)
    run: |
      python flood_monitor.py --both
    env:
      PYTHONUNBUFFERED: "1"
